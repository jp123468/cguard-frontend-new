<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />

    <title>C-Guard Pro | Plataforma de Gestión de Seguridad Física</title>

    <!-- Poppins is self-hosted (bundled via src/main.tsx) — no render-blocking
         Google Fonts CDN request, and no dependency on a CDN that email/geo
         filters sometimes block. (Removed the duplicate CDN <link>.) -->

    <!-- SEO Core -->
    <meta
      name="description"
      content="C-Guard Pro es la plataforma líder en gestión de seguridad física: control de guardias, puestos de vigilancia, rutas de patrullaje, reportes en tiempo real y seguimiento GPS desde la nube."
    />
    <meta
      name="keywords"
      content="C-Guard Pro, gestión de seguridad, guardias de seguridad, puestos de vigilancia, patrullaje, seguimiento GPS, seguridad física, Ecuador, plataforma seguridad, control guardias"
    />
    <meta name="author" content="C-Guard Pro" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#f97316" />
    <link rel="canonical" href="https://app.cguardpro.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="C-Guard Pro" />
    <meta property="og:locale" content="es_EC" />
    <meta property="og:title" content="C-Guard Pro | Plataforma de Gestión de Seguridad Física" />
    <meta
      property="og:description"
      content="Gestiona tus operaciones de seguridad con C-Guard Pro: puestos de vigilancia, guardias, rutas de patrullaje, reportes y seguimiento GPS en tiempo real."
    />
    <meta property="og:url" content="https://app.cguardpro.com/" />
    <meta property="og:image" content="https://app.cguardpro.com/assets/logo/c-guard-logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="C-Guard Pro | Plataforma de Gestión de Seguridad Física" />
    <meta
      name="twitter:description"
      content="Gestiona guardias, puestos de vigilancia y rutas de patrullaje con C-Guard Pro. Seguimiento GPS en tiempo real."
    />
    <meta name="twitter:image" content="https://app.cguardpro.com/assets/logo/c-guard-logo.png" />

    <!-- Favicon / Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/logo/c-guard-app-logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/logo/c-guard-app-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/logo/c-guard-app-logo.png" />
    <link rel="shortcut icon" type="image/png" href="/assets/logo/c-guard-app-logo.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "C-Guard Pro",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://app.cguardpro.com",
      "description": "Plataforma cloud de gestión de seguridad física: control de guardias, puestos de vigilancia, patrullaje GPS y reportes en tiempo real.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "provider": {
        "@type": "Organization",
        "name": "C-Guard Pro",
        "url": "https://app.cguardpro.com"
      }
    }
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
